name: Build and Deploy Frontend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/main_aihire.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build frontend
        env:
          VITE_API_URL: 'https://aihire-backend-d5f5cpaqbch8d6e5.southindia-01.azurewebsites.net'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Add Node.js server for Azure App Service static hosting
        run: |
          cat << 'EOF' > frontend/dist/package.json
          {
            "name": "aihire-frontend-server",
            "version": "1.0.0",
            "main": "server.js",
            "scripts": {
              "start": "node server.js"
            },
            "dependencies": {
              "express": "^4.19.2"
            }
          }
          EOF
          
          cat << 'EOF' > frontend/dist/server.js
          const express = require('express');
          const path = require('path');
          const app = express();
          const port = process.env.PORT || 8080;

          app.use(express.static(__dirname));

          app.get('*', (req, res) => {
            res.sendFile(path.join(__dirname, 'index.html'));
          });

          app.listen(port, () => {
            console.log(`Server running on port ${port}`);
          });
          EOF

          cd frontend/dist
          npm install --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AIHIRE'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './frontend/dist'
